<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>Touchscreen Auswahl</title>
</head>
<body>
    <div class="header">
        <h3>CoffITI</h3>
    </div>

    <div class="wrapper"> 
        <h2>Wähle deinen Kaffee</h1>
        <p clas="info_p">stelle dabei sicher, dass dein NFC Chip auf dem Scanner liegt</p>

        <button class="option_button" onclick="sendeAuswahl('Schwarz')">Schwarz</button>
        <button class="option_button" onclick="sendeAuswahl('Milchkaffee')">Milchkaffee</button>
        <button class="option_button" onclick="sendeAuswahl('Espresso')">Espresso</button>
        <button class="option_button" onclick="sendeAuswahl('Machiato')">Machiato</button>

    </div>

    <div class="footer">
        <ul>
            <li><a class="buttonhelper" href="index">Auswahl</a></li>
            <li><a href="favourites">Favoriten</a></li>
            <li><a href="statistik">Statistik</a></li>
        </ul>
        <div class="chip"></div>
        <p class="username" id="username"></p>
    </div>



	<script>
        async function sendeAuswahl(element) {
            const response = await fetch('/interaktion', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ element })
            });

            const result = await response.json();
            const info = document.getElementById('info');

            if (result.status === "ok") {
                info.textContent = `Auswahl gespeichert (Chip ${result.chip_id})`;
            } else {
                info.textContent = `⚠️ ${result.grund}`;
            }
        }
    </script>
</body>
</html>
